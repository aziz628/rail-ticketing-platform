# H2 In-Memory Database Configuration for Tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Flyway should run migrations automatically on start
spring.flyway.enabled=true
spring.jpa.hibernate.ddl-auto=validate

# Disable Redis for tests (we will mock it or use an embedded one if needed later, but standard is disabled or mock properties)
spring.data.redis.host=localhost
spring.data.redis.port=6370

# Disable SQL logs to keep test output clean
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false